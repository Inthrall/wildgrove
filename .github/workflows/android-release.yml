name: Android Release

# Manually-triggered signed release build. Produces a signed .aab, attaches it
# to a GitHub Release, and (optionally) uploads it to a Google Play track.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   UNITY_LICENSE / UNITY_EMAIL / UNITY_PASSWORD - as for android-build.yml
#   ANDROID_KEYSTORE_BASE64    - base64 of the upload keystore (wildgrove-upload.keystore)
#   ANDROID_KEYSTORE_PASSWORD  - keystore password
#   ANDROID_KEY_PASSWORD       - key password (same value for this keystore)
#   PLAY_SERVICE_ACCOUNT_JSON  - Google Play service-account key JSON (only needed
#                                when uploading to Play). The service account must
#                                be linked in the Play Console with "Release apps
#                                to testing tracks" (and production, if used).
# The signing key MUST stay the original upload key (alias wildgrove-upload) -
# Play registers it from the first upload and rejects anything else after that.

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Android versionCode (blank = auto: highest android-v* GitHub release + 1). Must be higher than the highest already uploaded to Play"
        required: false
        type: string
      versionName:
        description: "versionName (optional; defaults to 0.1.<versionCode>)"
        required: false
        type: string
      uploadToPlay:
        description: "Upload the .aab to Google Play (uncheck to only build + attach a GitHub Release)"
        required: true
        default: true
        type: boolean
      track:
        description: "Play track (production = full public release)"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write   # needed to create the GitHub Release

# Two concurrent blank-versionCode dispatches would resolve the same number
# and race the tag + Play upload — queue them instead.
concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    name: Build signed Android AAB
    runs-on: ubuntu-latest
    steps:
      # The Unity Android editor image is ~12 GB; ubuntu-latest runners don't
      # have room for it unless the preinstalled toolchains are removed first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Inputs reach the shell via env, never inline interpolation — a crafted
      # input must not become shell syntax — and are validated before use.
      - name: Resolve version code
        id: vc
        env:
          GH_TOKEN: ${{ github.token }}
          VC_INPUT: ${{ inputs.versionCode }}
        run: |
          vc="$VC_INPUT"
          if [ -n "$vc" ] && ! [[ "$vc" =~ ^[0-9]+$ ]]; then
            echo "::error::versionCode must be a whole number, got '$vc'"
            exit 1
          fi
          if [ -z "$vc" ]; then
            # Auto: one past the highest android-v* GIT TAG. Tags (not the
            # releases list) so a deleted release can't re-issue its number,
            # and --paginate so no volume of newer tags pushes the latest
            # android one out of a fixed window. Every Play upload goes
            # through this workflow, so the tags track Play's highest code.
            latest=$(gh api --paginate "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/android-v" --jq '.[].ref' \
              | sed -n 's/^refs\/tags\/android-v\([0-9]\{1,\}\)$/\1/p' | sort -n | tail -1)
            vc=$(( ${latest:-0} + 1 ))
          fi
          echo "Resolved versionCode: $vc"
          echo "versionCode=$vc" >> "$GITHUB_OUTPUT"

      - name: Resolve version name
        id: ver
        env:
          VN_INPUT: ${{ inputs.versionName }}
        run: |
          vn="$VN_INPUT"
          if [ -z "$vn" ]; then vn="0.1.${{ steps.vc.outputs.versionCode }}"; fi
          if ! [[ "$vn" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::versionName may only contain letters, digits, dots, dashes and underscores"
            exit 1
          fi
          echo "versionName=$vn" >> "$GITHUB_OUTPUT"

      # Same cache key family as android-build.yml so release builds reuse the
      # Library populated by the push builds.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      # Pinned by SHA — this action receives the upload keystore.
      - name: Build with Unity (signed)
        uses: game-ci/unity-builder@1d4ee0697f193f54668e98961d79907911f4b4f2 # v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          androidExportType: androidAppBundle
          androidSymbolType: debugging
          versioning: Custom
          version: ${{ steps.ver.outputs.versionName }}
          androidVersionCode: ${{ steps.vc.outputs.versionCode }}
          androidKeystoreName: wildgrove-upload.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          androidKeyaliasName: wildgrove-upload
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename AAB and locate symbols
        id: files
        run: |
          sudo mv build/Android/Android.aab "build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.aab"
          # Unity names the symbols archive after the build + version; resolve by glob.
          sym=$(ls build/Android/*.symbols.zip 2>/dev/null | head -1 || true)
          if [ -n "$sym" ]; then
            sudo mv "$sym" "build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.symbols.zip"
            echo "symbols=build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.symbols.zip" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No symbols.zip produced by the build."
            echo "symbols=" >> "$GITHUB_OUTPUT"
          fi
          # R8 is on (AndroidMinifyRelease), so Unity drops the deobfuscation map
          # beside the bundle as <name>_mapping.txt — ship it to Play so crash
          # and ANR stacks come back readable.
          map=$(ls build/Android/*_mapping.txt 2>/dev/null | head -1 || true)
          if [ -n "$map" ]; then
            sudo mv "$map" "build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.mapping.txt"
            echo "mapping=build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.mapping.txt" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No R8 mapping.txt produced by the build."
            echo "mapping=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: re-dispatching a versionCode replaces the assets on the
          # existing release instead of dying on the duplicate tag (which would
          # also block the Play upload step below).
          tag="android-v${{ steps.vc.outputs.versionCode }}"
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" \
              build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.* \
              --clobber
          else
            gh release create "$tag" \
              build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.* \
              --title "Android v${{ steps.vc.outputs.versionCode }} (${{ steps.ver.outputs.versionName }})" \
              --notes "Signed Android App Bundle of Wildgrove.

          Uploaded to Play track: ${{ inputs.uploadToPlay && inputs.track || 'not uploaded' }}."
          fi

      # Pinned by SHA — this action receives the Play service-account key.
      - name: Upload to Google Play
        if: ${{ inputs.uploadToPlay }}
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.inthrall.wildgrove
          releaseFiles: build/Android/Wildgrove-v${{ steps.vc.outputs.versionCode }}.aab
          debugSymbols: ${{ steps.files.outputs.symbols }}
          mappingFile: ${{ steps.files.outputs.mapping }}
          tracks: ${{ inputs.track }}
          status: completed
