name: Android Build

# Requires repo secrets UNITY_LICENSE / UNITY_EMAIL / UNITY_PASSWORD.
# License activation guide: https://game.ci/docs/github/activation

# The repo is public, so Actions minutes are free — the push trigger is
# back (it goes dispatch-only whenever the repo turns private, where an
# IL2CPP Unity build per push exhausts the free budget).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["Assets/**", "Packages/**", "ProjectSettings/**", "design/data/**", ".github/workflows/android-build.yml"]

jobs:
  # The EditMode suite — sim regressions must not ship to Play on a
  # green build badge. Runs alongside the Android build, not gating it.
  test:
    name: EditMode tests
    runs-on: ubuntu-latest
    # unity-test-runner posts the suite result as a check run; the default
    # GITHUB_TOKEN is read-only, so grant it checks: write or the job fails
    # with "Resource not accessible by integration" even when tests pass.
    permissions:
      contents: read
      checks: write
    steps:
      # The Unity editor image is large; ubuntu-latest runners don't reliably
      # have room for it (first failure mode: docker pull "no space left on
      # device") unless the preinstalled toolchains are removed first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      # The Google/Firebase tarballs manifest.json references are not
      # committed — fetch them before anything hashes or resolves Packages/.
      - name: Fetch Google packages
        run: bash tools/fetch-google-packages.sh

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-Tests-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Tests-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: artifacts
          retention-days: 14

  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # The Unity Android editor image is ~12 GB; ubuntu-latest runners don't
      # have room for it unless the preinstalled toolchains are removed first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      # The Google/Firebase tarballs manifest.json references are not
      # committed — fetch them before anything hashes or resolves Packages/.
      - name: Fetch Google packages
        run: bash tools/fetch-google-packages.sh

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      # Pinned by SHA — this action receives the upload keystore.
      - name: Build with Unity
        uses: game-ci/unity-builder@d829bfc901f2347c8fe18898f06712b66916ef42 # v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          androidExportType: androidAppBundle
          # unityVersion is auto-detected from ProjectSettings/ProjectVersion.txt
          # Release-sign with the upload key so Play accepts the artifact
          # (Play rejects debug-signed bundles).
          androidKeystoreName: wildgrove-upload.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          androidKeyaliasName: wildgrove-upload
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildgrove-aab
          path: build/Android/*.aab
          retention-days: 14
