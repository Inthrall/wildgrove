name: Android Build

# Requires repo secrets UNITY_LICENSE / UNITY_EMAIL / UNITY_PASSWORD.
# License activation guide: https://game.ci/docs/github/activation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "design/data/**"
      - ".github/workflows/android-build.yml"

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      # The Unity Android editor image is ~12 GB; ubuntu-latest runners don't
      # have room for it unless the preinstalled toolchains are removed first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          androidExportType: androidAppBundle
          # unityVersion is auto-detected from ProjectSettings/ProjectVersion.txt
          # Release-sign with the upload key so Play accepts the artifact
          # (Play rejects debug-signed bundles).
          androidKeystoreName: wildgrove-upload.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          androidKeyaliasName: wildgrove-upload
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildgrove-aab
          path: build/Android/*.aab
          retention-days: 14
